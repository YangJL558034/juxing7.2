<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>聚星离线模式</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 18%, rgba(81, 213, 255, 0.28), transparent 32%),
        radial-gradient(circle at 72% 72%, rgba(180, 93, 255, 0.26), transparent 34%),
        linear-gradient(145deg, #071225 0%, #081b38 45%, #0a2e53 100%);
      color: #eef7ff;
    }
    .card {
      width: min(420px, 100%);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 34px;
      padding: 26px;
      text-align: center;
      background: rgba(5, 16, 35, 0.72);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(20px);
    }
    .logo {
      width: 112px;
      height: 112px;
      object-fit: cover;
      border-radius: 30px;
      box-shadow: 0 18px 42px rgba(55, 190, 255, 0.26);
    }
    h1 {
      margin: 20px 0 8px;
      font-size: 24px;
      letter-spacing: 0.06em;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: rgba(238, 247, 255, 0.72);
      font-size: 14px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      border-radius: 999px;
      padding: 8px 13px;
      background: rgba(255,255,255,0.1);
      color: rgba(238,247,255,0.82);
      font-size: 13px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fbbf24;
      box-shadow: 0 0 18px #fbbf24;
    }
    button {
      width: 100%;
      height: 48px;
      margin-top: 22px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #4bd8ff, #6d7cff 56%, #b865ff);
      color: #06101f;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="聚星" />
    <h1>聚星离线模式</h1>
    <p>当前无法连接云端系统。请保持应用打开，网络恢复后会自动重新连接并触发同步队列。</p>
    <div class="status"><span class="dot"></span><span id="status">正在等待网络恢复</span></div>
    <button type="button" onclick="retry()">重新连接</button>
  </main>
  <script>
    function retry() {
      if (window.JuxingAndroid && window.JuxingAndroid.reloadCloud) {
        window.JuxingAndroid.reloadCloud();
      } else {
        location.href = 'https://test.shanzesz.com/mobile';
      }
    }
    window.addEventListener('online', retry);
    setInterval(function () {
      document.getElementById('status').textContent = navigator.onLine ? '检测到网络，正在连接云端' : '正在等待网络恢复';
      if (navigator.onLine) retry();
    }, 3000);
  </script>
</body>
</html>
